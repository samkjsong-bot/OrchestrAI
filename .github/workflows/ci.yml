name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 모든 javascript actions 를 Node 24 로 강제 (Node 20 deprecation 우회)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['20.x']

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (esbuild bundle)
        run: npm run build

      - name: Test
        run: npm test

      - name: Package vsix (no publish, sanity check)
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm prune --omit=dev
          npx vsce package --allow-missing-repository -o orchestrai-ci.vsix
          ls -la orchestrai-ci.vsix

      - name: Upload vsix artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v5
        with:
          name: orchestrai-vsix-${{ github.sha }}
          path: orchestrai-ci.vsix
          retention-days: 14
